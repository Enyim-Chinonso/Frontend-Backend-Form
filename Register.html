<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="./Styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

     <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>
<body style="font-family: 'Poppins', sans-serif;  background: url('Images/Register-image.jpg') no-repeat center cover fixed;">
 

  <div class="container d-flex justify-content-center align-items-center">
    
    <div class="card shadow p-4" style="width: 400px;">
      <h3 class="text-center mb-4">Create Account</h3>

      <!-- FORM  -->
      <form id="registerForm">

        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="mb-3 position-relative">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
          <span class="toggle-password position-absolute top-50 end-0 translate-middle-y me-3" onclick="togglePassword('password', this)">
    👁️
  </span> 
        </div>

        <div class="mb-3 position-relative">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
          <span class="toggle-password position-absolute top-50 end-0 translate-middle-y me-3" onclick="togglePassword('confirmPassword', this)"> 
       👁️ 
  </span>
        </div>

        <button class="btn btn-primary mt-3 w-100">Register</button>

      </form>

      <p class="text-center mt-5">
        Already have an account? <a href="login.html">Login</a>
      </p>

      <!-- MESSAGE -->
      <div id="message" class="mt-3 text-center"></div>

    </div>

  </div>

    







    <script src="./Script/script.js"></script>
</body>
</html>
